<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Funny Excuse Generator 😂</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <h1>😂 Funny Excuse</h1>
            <button id="themeToggle">🌙</button>
        </div>

        <p class="subtitle">Choose category & generate bahana 😎</p>

        <select id="category">
            <option value="office">Office</option>
            <option value="college">College</option>
            <option value="friends">Friends</option>
        </select>

        <div class="excuse-box animate" id="excuse">
            Click Generate to get excuse!
        </div>

        <button id="generateBtn">Generate Excuse</button>
        <button id="copyBtn" class="copy-btn">📋 Copy Excuse</button>
   <div class="footer-marquee">
  <marquee behavior="scroll" direction="left" scrollamount="5">
    © @Charan-Suraj
  </marquee>
</div>

    <script src="script.js"></script>
</body>
</html>
